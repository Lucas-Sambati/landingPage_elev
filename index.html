    <link rel="preconnect" href="https://cdn.utmify.com.br" crossorigin />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />

    <!-- Pixel de pageview NO HEAD — dispara o mais cedo possível -->
    <script>
      window.pixelId = "69a27d2873a647fcc4e1800d";
      var a = document.createElement("script");
      a.setAttribute("async", "");
      a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
      document.head.appendChild(a);
    </script>

    <link

    />
  </head>

  <body>
    <!-- SPA redirect handler for GitHub Pages -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);
    </script>
    <div id="root">
      <!-- Skeleton visível antes do React montar — evita tela branca -->
      <div
        id="skeleton"
        style="
          min-height: 100vh;
          background: #0e0e11;
          display: flex;
          flex-direction: column;
        "
      >
        <!-- Navbar skeleton -->
        <div
          style="
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 24px;
          "
        >
          <div
            style="
              width: 80px;
              height: 28px;
              border-radius: 6px;
              background: #1a1a22;
            "
          ></div>
        </div>
        <!-- Hero skeleton -->
        <div
          style="
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
          "
        >
          <div style="text-align: center; max-width: 600px; padding: 0 24px">
            <div
              style="
                height: 48px;
                width: 80%;
                margin: 0 auto 16px;
                border-radius: 8px;
                background: #1a1a22;
              "
            ></div>
            <div
              style="
                height: 48px;
                width: 60%;
                margin: 0 auto 24px;
                border-radius: 8px;
                background: #1a1a22;
              "
            ></div>
            <div
              style="
                height: 20px;
                width: 70%;
                margin: 0 auto 32px;
                border-radius: 6px;
                background: #16161d;
              "
            ></div>
            <div style="display: flex; gap: 12px; justify-content: center">
              <div
                style="
                  height: 48px;
                  width: 160px;
                  border-radius: 12px;
                  background: hsl(243 76% 59% / 0.3);
                "
              ></div>
              <div
                style="
                  height: 48px;
                  width: 160px;
                  border-radius: 12px;
                  background: #1a1a22;
                  border: 1px solid #2a2a35;
                "
              ></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Pixel já carregado no <head> para disparar pageview mais cedo -->
    <!-- UTM tracking -->
    <script
      src="https://cdn.utmify.com.br/scripts/utms/latest.js"
      data-utmify-prevent-xcod-sck
      data-utmify-prevent-subids
      async
      defer
    ></script>
